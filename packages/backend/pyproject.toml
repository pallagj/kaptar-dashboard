[project]
name = "kaptar-backend"
version = "0.1.0"
description = "Beehive scale dashboard backend"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "httpx>=0.27",
    "beautifulsoup4>=4.12",
    "lxml>=5.0",
    "apscheduler>=3.10",
    "pydantic>=2.6",
    "pywebpush>=2.0",
    "py-vapid>=1.9",
    "cryptography>=42",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["app*"]
